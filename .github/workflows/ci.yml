name: "🔍 CI"

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    name: "⚙️ Setup"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "📦 Install SVN"
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: "⬇️ Materialize pinned vendor snapshot"
        run: mise run vendor:update
      - name: "📤 Upload vendor snapshot"
        uses: actions/upload-artifact@v7
        with:
          name: vendor
          path: vendor
          retention-days: 1

  format:
    name: "🎨 Format"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "🛠️ Ensure Rust components"
        run: rustup component add rustfmt
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "✅ Check Rust formatting"
        run: mise run rust:fmt
      - name: "✅ Check TypeScript formatting"
        run: mise run ts:fmt
      - name: "✅ Check Lua formatting"
        run: mise run lua:fmt

  lint:
    name: "🧹 Lint"
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "🛠️ Ensure Rust components"
        run: rustup component add clippy
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Lint Rust"
        run: mise run rust:lint
      - name: "✅ Lint TypeScript"
        run: mise run ts:lint

  test:
    name: "🧪 Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Run tests"
        run: cargo test -p wow-sharedmedia

  docs:
    name: "📖 Docs"
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Build docs"
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p wow-sharedmedia --no-deps

  package:
    name: "📦 Package"
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Dry-run package"
        run: cargo package -p wow-sharedmedia --allow-dirty
