name: "🔍 CI"

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: "🎨 Rust Format"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: "✅ Check formatting"
        run: cargo fmt --all --check

  stylua:
    name: "🌙 Lua Format"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Install StyLua"
        run: cargo install --locked stylua
      - name: "✅ Check formatting"
        run: stylua --check templates/*.lua

  oxc:
    name: "🔎 OXC (lint + format)"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile
      - name: "✅ Check formatting"
        run: bun run format:check
      - name: "🧹 Lint"
        run: bun run lint

  vendor:
    name: "📦 Download Vendor"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile
      - name: "📦 Install SVN"
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: "⬇️ Export vendor libraries"
        run: bun run update-vendor
      - uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor
          retention-days: 1

  clippy:
    name: "🧹 Clippy"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor"
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: "✅ Lint crate"
        run: cargo clippy -p wow-windmedia --all-targets -- -D warnings

  test:
    name: "🧪 Tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [vendor]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor"
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: "✅ Run tests"
        run: cargo test -p wow-windmedia

  docs:
    name: "📖 Docs"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor"
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: "✅ Build docs"
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p wow-windmedia --no-deps

  msrv:
    name: "🏛️ MSRV"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor"
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: "✅ Check MSRV"
        run: cargo check -p wow-windmedia

  package:
    name: "📦 Package"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor"
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor
      - name: "✅ Dry-run package"
        run: cargo package -p wow-windmedia
