name: "🔍 CI"

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  vendor:
    name: "📦 Materialize Vendor Snapshot"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "📦 Install SVN"
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: "⬇️ Materialize pinned vendor snapshot"
        run: mise run vendor:update
      - name: "📤 Upload vendor snapshot"
        uses: actions/upload-artifact@v7
        with:
          name: vendor
          path: vendor
          retention-days: 1

  fmt-rust:
    name: "🎨 Format (Rust)"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "🛠️ Ensure Rust components"
        run: rustup component add rustfmt
      - name: "✅ Check formatting"
        run: mise run rust:fmt

  fmt-ts:
    name: "🎨 Format (TypeScript)"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "✅ Check formatting"
        run: mise run ts:fmt

  fmt-lua:
    name: "🎨 Format (Lua)"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "✅ Check formatting"
        run: mise run lua:fmt

  lint-rust:
    name: "🧹 Clippy"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "🛠️ Ensure Rust components"
        run: rustup component add clippy
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Lint crate"
        run: mise run rust:lint

  lint-ts:
    name: "🧹 Lint (TypeScript)"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "✅ Lint"
        run: mise run ts:lint

  test:
    name: "🧪 Tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: [vendor]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Run tests"
        run: cargo test -p wow-sharedmedia

  docs:
    name: "📖 Docs"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Build docs"
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p wow-sharedmedia --no-deps

  msrv:
    name: "🏛️ MSRV"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Check MSRV"
        run: cargo check -p wow-sharedmedia

  package:
    name: "📦 Package"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "✅ Dry-run package"
        run: cargo package -p wow-sharedmedia --allow-dirty
