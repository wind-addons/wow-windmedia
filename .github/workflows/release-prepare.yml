name: "🧭 Prepare Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type (auto, major, minor, patch, or exact version like 1.0.0-beta.1)"
        required: true
        default: "auto"
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: "📝 Create release prep PR"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile

      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2

      - name: "📦 Install cargo-edit"
        run: cargo install cargo-edit --locked

      - name: "✍️ Configure git identity"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "🌿 Create release prep branch"
        id: branch
        shell: bash
        run: |
          set -euo pipefail

          branch="release/prepare-${{ github.run_id }}-${{ github.run_attempt }}"
          git switch -c "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: "🧮 Resolve version"
        id: version
        shell: bash
        run: |
          set -euo pipefail

          bump="${{ inputs.bump }}"
          current="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"

          if [ "$bump" = "auto" ] && [ -z "$(git tag --list)" ]; then
            version="$current"
            echo "first_release=true" >> "$GITHUB_OUTPUT"
            echo "No tags found — using current version $version for initial release"
          elif [ "$bump" = "auto" ]; then
            echo "first_release=false" >> "$GITHUB_OUTPUT"
            echo "use_cog=true" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$bump" = "major" ] || [ "$bump" = "minor" ] || [ "$bump" = "patch" ]; then
            cargo set-version --bump "$bump"
            version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          else
            cargo set-version "$bump"
            version="$bump"
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          fi

          git add :/Cargo.toml
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "use_cog=false" >> "$GITHUB_OUTPUT"

      - name: "🚀 Bump via cocogitto (auto mode)"
        if: steps.version.outputs.use_cog == 'true'
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto

      - name: "🧮 Read version after cog bump"
        if: steps.version.outputs.use_cog == 'true'
        id: cog_version
        shell: bash
        run: |
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "🚀 Commit version bump"
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          if [ -z "$version" ]; then
            version="${{ steps.cog_version.outputs.version }}"
          fi

          if [ "${{ steps.version.outputs.use_cog }}" != "true" ]; then
            if git diff --cached --quiet; then
              echo "No staged changes — skipping commit (version unchanged)"
            else
              git commit -m "chore(release): $version"
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "📦 Install cocogitto for changelog"
        run: cargo install cocogitto --locked

      - name: "📋 Generate changelog"
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.commit.outputs.version }}"
          if [ -z "$version" ]; then
            version="${{ steps.cog_version.outputs.version }}"
          fi

          git fetch origin main --tags

          prev_tag="$(git tag --sort=-version:creatordate | head -1 || true)"

          if [ -n "$prev_tag" ]; then
            prev_oid="$(git rev-parse "$prev_tag")"
            echo "Generating changelog from $prev_tag ($prev_oid) to $version"
            cog changelog "${prev_oid}..HEAD" > /tmp/new_changelog.md
          else
            echo "No previous tag found — generating full changelog for $version"
            cog changelog > /tmp/new_changelog.md || echo "## $version" > /tmp/new_changelog.md
          fi

          if [ -f CHANGELOG.md ]; then
            echo "" >> /tmp/new_changelog.md
            cat CHANGELOG.md >> /tmp/new_changelog.md
          fi
          mv /tmp/new_changelog.md CHANGELOG.md

      - name: "🎨 Format changelog"
        working-directory: scripts
        run: bun x oxfmt "$GITHUB_WORKSPACE/CHANGELOG.md"

      - name: "🧾 Include changelog in release commit"
        shell: bash
        run: |
          set -euo pipefail

          git add CHANGELOG.md

          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

      - name: "📤 Push release prep branch"
        shell: bash
        run: |
          set -euo pipefail
          git push -u origin "${{ steps.branch.outputs.branch }}"

      - name: "🔀 Open release prep PR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.commit.outputs.version }}"
          if [ -z "$version" ]; then
            version="${{ steps.cog_version.outputs.version }}"
          fi

          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(release): prepare $version" \
            --body "$(cat <<EOF
          ## Summary

          - prepare version $version for review and merge
          - update Cargo.toml and CHANGELOG.md before publishing
          - publish only after this PR merges to main and CI is green
          EOF
          )"
