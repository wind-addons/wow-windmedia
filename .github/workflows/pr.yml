name: "🔍 PR Check"

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional:
    name: "📝 Conventional Commits"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: "📥 Fetch live PR title"
        id: pr_title
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            core.setOutput('title', data.title);
      - name: "🔍 Verify PR title"
        shell: bash
        run: |
          title='${{ steps.pr_title.outputs.title }}'
          pattern='^(feat|fix|docs|refactor|test|ci|chore|build|perf|style|revert)(\([a-zA-Z0-9._/-]+\))?!?: .+'
          if [[ ! "$title" =~ $pattern ]]; then
            echo "Invalid PR title: $title"
            echo "Expected Conventional Commit format, e.g. 'feat: add loader runtime test'"
            exit 1
          fi
      - name: "📦 Verify commit messages"
        uses: cocogitto/cocogitto-action@v4
        with:
          command: check
          args: ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
