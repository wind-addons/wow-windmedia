name: "🚀 Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type (auto, major, minor, patch, or version)"
        required: true
        default: "auto"
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  vendor:
    name: "📦 Materialize Vendor Snapshot"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🦀 Setup Bun"
        uses: oven-sh/setup-bun@v2
      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile
      - name: "📦 Install SVN"
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: "⬇️ Materialize pinned vendor snapshot"
        run: bun run update-vendor
      - name: "📤 Upload vendor snapshot"
        uses: actions/upload-artifact@v7
        with:
          name: vendor
          path: vendor
          retention-days: 1

  verify:
    name: "✅ Verify"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🦀 Setup Rust toolchain"
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "🎨 Check formatting"
        run: cargo fmt --all --check
      - name: "📦 Install StyLua"
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check templates/*.lua
      - name: "🧹 Clippy"
        run: cargo clippy -p wow-windmedia --all-targets -- -D warnings
      - name: "🧪 Tests"
        run: cargo test -p wow-windmedia
      - name: "📖 Docs"
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p wow-windmedia --no-deps
      - name: "📦 Package dry run"
        run: cargo publish -p wow-windmedia --dry-run --allow-dirty

  release:
    name: "🚀 Bump, Publish & Release"
    runs-on: ubuntu-latest
    needs: [verify]
    environment: release
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "🦀 Setup Rust toolchain"
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Install cargo-edit"
        run: cargo install cargo-edit --locked
      - name: "🚀 Bump version and create tag"
        id: release
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --${{ github.event.inputs.bump }}
      - name: "📋 Generate changelog"
        run: cog changelog --at ${{ steps.release.outputs.version }} -t full_hash > GITHUB_CHANGELOG.md
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "🔍 Verify publish working tree"
        shell: bash
        run: |
          set -euo pipefail

          unexpected="$(git status --porcelain | grep -v '^?? GITHUB_CHANGELOG.md$' | grep -v '^?? vendor/' || true)"

          if [ -n "$unexpected" ]; then
            printf 'Unexpected working tree changes before publish:\n%s\n' "$unexpected"
            exit 1
          fi
      - name: "📦 Publish to crates.io"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # --allow-dirty: vendor artifacts are regenerated locally and GITHUB_CHANGELOG.md is untracked
        run: cargo publish -p wow-windmedia --allow-dirty
      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: GITHUB_CHANGELOG.md
          tag_name: ${{ steps.release.outputs.version }}
