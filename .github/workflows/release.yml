name: "🚀 Publish Release"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (main, commit SHA, or release tag target)"
        required: true
        default: "main"
        type: string
      registry_auth:
        description: "crates.io auth mode"
        required: true
        default: "trusted"
        type: choice
        options:
          - trusted
          - bootstrap-token

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  vendor:
    name: "📦 Materialize Vendor Snapshot"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
      - name: "📦 Install dependencies"
        run: cd scripts && bun install --frozen-lockfile
      - name: "📦 Install SVN"
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: "⬇️ Materialize pinned vendor snapshot"
        run: mise run vendor:update
      - name: "📤 Upload vendor snapshot"
        uses: actions/upload-artifact@v7
        with:
          name: vendor
          path: vendor
          retention-days: 1

  verify:
    name: "✅ Verify"
    runs-on: ubuntu-latest
    needs: [vendor]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor
      - name: "🎨 Check formatting"
        run: mise run rust:fmt
      - name: "✅ Check Lua formatting"
        run: mise run lua:fmt
      - name: "🧹 Clippy"
        run: mise run rust:lint
      - name: "🧪 Tests"
        run: cargo test -p wow-sharedmedia
      - name: "📖 Docs"
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p wow-sharedmedia --no-deps
      - name: "📦 Package dry run"
        run: cargo publish -p wow-sharedmedia --dry-run --allow-dirty

  release:
    name: "🚀 Publish & Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [verify]
    environment: release
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "📦 Install cocogitto"
        run: cargo install cocogitto --locked

      - name: "🏷️ Read crate version"
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "📋 Generate changelog"
        run: cog changelog --at ${{ steps.version.outputs.version }} -t full_hash > GITHUB_CHANGELOG.md

      - name: "📦 Download vendor snapshot"
        uses: actions/download-artifact@v8
        with:
          name: vendor
          path: vendor

      - name: "🔐 Request trusted publishing token"
        if: ${{ inputs.registry_auth == 'trusted' }}
        id: crates_auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: "📦 Publish to crates.io (trusted)"
        if: ${{ inputs.registry_auth == 'trusted' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_auth.outputs.token }}
        run: cargo publish -p wow-sharedmedia --allow-dirty

      - name: "📦 Publish to crates.io (bootstrap token)"
        if: ${{ inputs.registry_auth == 'bootstrap-token' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_BOOTSTRAP_TOKEN }}
        run: cargo publish -p wow-sharedmedia --allow-dirty

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: GITHUB_CHANGELOG.md
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ inputs.ref }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
